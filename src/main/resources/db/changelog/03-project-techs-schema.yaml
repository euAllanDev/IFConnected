databaseChangeLog:
  - changeSet:
      id: 10-create-project-technologies
      author: ifconnected-team
      changes:
        - createTable:
            tableName: project_technologies
            columns:
              - column:
                  name: project_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: tech_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: project_technologies
            baseColumnNames: project_id
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_project_techs_project
            onDelete: CASCADE